# This file is used to define the scenarios that are run by snakemake. Each entry on the first level is a scenario. Each scenario can contain configuration overrides with respect to the config/config.yaml settings.
#
# Example
#
# custom-scenario: # name of the scenario
#   electricity:
#       renewable_carriers: [wind, solar] # override the list of renewable carriers

no_emissions:
  biomass:
    emission_factors:
      forest residues biomass: 0 # tCO2/MWh
      rest product biomass: 0 # tCO2//MWh
      waste biomass: 0 # tCO2/MWh
      biogas: 0 # tCO2/MWh

sensible_emissions:
    biomass:
      emission_factors:
        forest residues biomass: 0.1 # tCO2/MWh
        rest product biomass: 0.02 # tCO2//MWh
        waste biomass: 0.0 # tCO2/MWh
        biogas: 0.1 # tCO2/MWh

high_emissions:
  biomass:
    emission_factors:
      forest residues biomass:  0.2 # tCO2/MWh 100% more than sensible
      rest product biomass: 0.1 # tCO2//MWh
      waste biomass: 0 # tCO2/MWh
      biogas: 0.2 # tCO2/MWh

very_high_emissions:
  biomass:
    emission_factors:
      forest residues biomass:  0.4 # tCO2/MWh 100% more than sensible
      rest product biomass: 0.1 # tCO2//MWh
      waste biomass: 0 # tCO2/MWh
      biogas: 0.2 # tCO2/MWh
