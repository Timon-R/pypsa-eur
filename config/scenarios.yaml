# This file is used to define the scenarios that are run by snakemake. Each entry on the first level is a scenario. Each scenario can contain configuration overrides with respect to the config/config.yaml settings.
#
# Example
#
# custom-scenario: # name of the scenario
#   electricity:
#       renewable_carriers: [wind, solar] # override the list of renewable carriers


stochastic:
  stochasticity: #gas price used in the standard model:  24.568 EUR/MWh_th
    gas_price:
      enable: true
      distribution: scenarios #options: scenarios, normal, uniform
      scenarios: #add as many scenarios as you want, first the value of the gas price in  EUR/MWh_th, then the probability of that scenario 
        - 20, 0.5
        - 40, 0.5

low_price:
  stochasticity: #gas price used in the standard model:  24.568 EUR/MWh_th
    gas_price:
      enable: true
      distribution: scenarios #options: scenarios, normal, uniform
      scenarios: #add as many scenarios as you want, first the value of the gas price in  EUR/MWh_th, then the probability of that scenario 
        - 20, 1

high_price:
  stochasticity: #gas price used in the standard model:  24.568 EUR/MWh_th
    gas_price:
      enable: true
      distribution: scenarios #options: scenarios, normal, uniform
      scenarios: #add as many scenarios as you want, first the value of the gas price in  EUR/MWh_th, then the probability of that scenario 
        - 40, 1

stochastic_normal:
  stochasticity: #gas price used in the standard model:  24.568 EUR/MWh_th
    gas_price:
      enable: true
      distribution: normal #options: scenarios, normal, uniform
      normal_distribution: 
        mean: 30
        std: 5
      number_of_scenarios: 10

stochastic_uniform:
  stochasticity: #gas price used in the standard model:  24.568 EUR/MWh_th
    gas_price:
      enable: true
      distribution: uniform #options: scenarios, normal, uniform
      uniform_distribution: 
        min: 20
        max: 40
      number_of_scenarios: 10
